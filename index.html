<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#EDEDED">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="记账">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>记账</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --wx-green:#07C160;--wx-red:#FA5151;--wx-blue:#576B95;--wx-orange:#FF9500;
  --wx-bg:#EDEDED;--wx-card:#FFFFFF;--wx-text:#191919;--wx-sub:#888;
  --wx-desc:#B2B2B2;--wx-line:#E5E5E5;--wx-divider:#F6F6F6;
  --safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;background:var(--wx-bg);color:var(--wx-text);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
.app{max-width:480px;margin:0 auto;padding-bottom:calc(56px + var(--safe-bottom))}

/* wx-style top bar */
.topbar{background:var(--wx-bg);padding:calc(12px + var(--safe-top)) 16px 8px;text-align:center;position:sticky;top:0;z-index:50}
.topbar h1{font-size:17px;font-weight:500;color:var(--wx-text)}

/* month picker */
.month-bar{display:flex;align-items:center;justify-content:center;gap:20px;padding:10px 16px;background:var(--wx-card);border-bottom:1px solid var(--wx-line)}
.month-bar button{background:none;border:none;font-size:16px;color:var(--wx-blue);cursor:pointer;padding:4px 8px}
.month-bar span{font-size:15px;font-weight:500;min-width:90px;text-align:center}

/* balance summary - wx style cell group */
.cell-group{margin:8px 0;background:var(--wx-card)}
.cell-group .cg-title{font-size:13px;color:var(--wx-sub);padding:10px 16px 6px}
.bal-cells{display:flex;border-bottom:1px solid var(--wx-line)}
.bal-cell{flex:1;text-align:center;padding:12px 8px;position:relative}
.bal-cell:not(:last-child)::after{content:'';position:absolute;right:0;top:25%;height:50%;width:1px;background:var(--wx-line)}
.bal-cell .bl{font-size:12px;color:var(--wx-sub);margin-bottom:4px}
.bal-cell .bv{font-size:18px;font-weight:500}
.bv.inc{color:var(--wx-green)}.bv.exp{color:var(--wx-red)}

/* budget bar */
.budget-row{padding:10px 16px;border-bottom:1px solid var(--wx-line);font-size:13px;color:var(--wx-sub)}
.budget-detail{display:flex;justify-content:space-between;margin-bottom:6px}
.budget-track{height:4px;background:var(--wx-divider);border-radius:2px;overflow:hidden}
.budget-fill{height:100%;border-radius:2px;transition:width .3s}

/* tabs - wx style */
.wx-tabs{display:flex;background:var(--wx-card);border-bottom:1px solid var(--wx-line);position:sticky;top:calc(44px + var(--safe-top));z-index:49}
.wx-tab{flex:1;text-align:center;padding:10px 0;font-size:14px;color:var(--wx-sub);background:none;border:none;cursor:pointer;position:relative;transition:color .2s}
.wx-tab.active{color:var(--wx-text);font-weight:500}
.wx-tab.active::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:24px;height:2px;background:var(--wx-text);border-radius:1px}

.tab-pane{display:none;padding:0}.tab-pane.active{display:block}

/* action buttons */
.action-row{display:flex;margin:8px 0;background:var(--wx-card)}
.action-row .act{flex:1;text-align:center;padding:14px 8px;border:none;background:none;cursor:pointer;position:relative;font-size:13px;color:var(--wx-text)}
.action-row .act:not(:last-child)::after{content:'';position:absolute;right:0;top:25%;height:50%;width:1px;background:var(--wx-line)}
.action-row .act .act-icon{font-size:20px;display:block;margin-bottom:4px}

/* record list */
.rec-list{background:var(--wx-card);margin:8px 0}
.rec-date-header{font-size:12px;color:var(--wx-sub);padding:8px 16px 4px}
.rec-item{display:flex;align-items:center;padding:12px 16px;border-bottom:1px solid var(--wx-divider);cursor:default}
.rec-item:last-child{border-bottom:none}
.rec-left{display:flex;align-items:center;gap:10px;flex:1;min-width:0}
.rec-cat-icon{font-size:28px;width:36px;text-align:center;flex-shrink:0}
.rec-cat-name{font-size:15px;color:var(--wx-text)}
.rec-cat-note{font-size:12px;color:var(--wx-sub);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rec-right{text-align:right;display:flex;align-items:center;gap:8px;flex-shrink:0}
.rec-amt{font-size:15px;font-weight:500}
.rec-amt.inc{color:var(--wx-green)}.rec-amt.exp{color:var(--wx-text)}
.rec-time{font-size:11px;color:var(--wx-desc)}
.rec-del{background:none;border:none;color:var(--wx-desc);font-size:14px;cursor:pointer;padding:4px}

/* charts */
.chart-section{background:var(--wx-card);margin:8px 0}
.chart-section .cs-head{padding:12px 16px;border-bottom:1px solid var(--wx-line);font-size:15px;font-weight:500}
.chart-box{padding:16px;position:relative;height:240px}

/* rank */
.rank-list{background:var(--wx-card);margin:8px 0}
.rank-list .cs-head{padding:12px 16px;border-bottom:1px solid var(--wx-line);font-size:15px;font-weight:500}
.rk-row{display:flex;align-items:center;padding:12px 16px;border-bottom:1px solid var(--wx-divider)}
.rk-row:last-child{border-bottom:none}
.rk-idx{width:20px;font-size:13px;color:var(--wx-sub);font-weight:500;text-align:center;margin-right:10px}
.rk-top{color:var(--wx-orange);font-weight:600}
.rk-mid{flex:1}
.rk-name{font-size:14px;margin-bottom:4px}
.rk-track{height:3px;background:var(--wx-divider);border-radius:1.5px;overflow:hidden}
.rk-fill{height:100%;border-radius:1.5px}
.rk-val{font-size:14px;font-weight:500;margin-left:12px;text-align:right;min-width:70px}
.rk-pct{font-size:11px;color:var(--wx-sub)}

/* year grid */
.year-card{background:var(--wx-card);margin:8px 0}
.year-card .cs-head{padding:12px 16px;border-bottom:1px solid var(--wx-line);font-size:15px;font-weight:500}
.year-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--wx-line);margin:0 1px}
.yg-cell{background:var(--wx-card);text-align:center;padding:10px 4px;font-size:12px}
.yg-cell .yn{font-weight:500;margin-bottom:3px}
.yg-cell .yv{font-size:11px;color:var(--wx-sub)}
.yg-cell .yv-e{color:var(--wx-red)}.yg-cell .yv-i{color:var(--wx-green)}

/* settings */
.set-group{background:var(--wx-card);margin:8px 0}
.set-group .cs-head{padding:12px 16px;border-bottom:1px solid var(--wx-line);font-size:15px;font-weight:500}
.set-row{display:flex;align-items:center;padding:12px 16px;border-bottom:1px solid var(--wx-divider)}
.set-row:last-child{border-bottom:none}
.set-row label{flex:1;font-size:15px}
.set-row input{width:110px;padding:6px 8px;border:1px solid var(--wx-line);border-radius:4px;text-align:right;font-size:15px;background:var(--wx-bg);color:var(--wx-text)}
.set-row input:focus{outline:none;border-color:var(--wx-blue)}
.set-btn{display:block;width:calc(100% - 32px);margin:10px 16px;padding:12px;border:none;border-radius:4px;background:var(--wx-blue);color:#fff;font-size:15px;font-weight:500;cursor:pointer}
.set-btn.danger{background:#FFF;color:var(--wx-red);border:1px solid var(--wx-line)}
.set-btn.outline{background:#FFF;color:var(--wx-blue);border:1px solid var(--wx-line)}

/* modal */
.modal-mask{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.45);z-index:1000;align-items:flex-end;justify-content:center}
.modal-mask.show{display:flex}
.modal-sheet{background:var(--wx-card);width:100%;max-width:480px;padding:20px 16px calc(20px + var(--safe-bottom));max-height:88vh;overflow-y:auto;animation:sheetUp .25s ease}
@keyframes sheetUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-bar{width:36px;height:4px;background:var(--wx-desc);border-radius:2px;margin:0 auto 14px}
.modal-hd{text-align:center;font-size:17px;font-weight:500;margin-bottom:18px;color:var(--wx-text)}

/* type toggle - wx segmented */
.seg{display:flex;background:var(--wx-bg);border-radius:6px;padding:2px;margin-bottom:16px}
.seg button{flex:1;padding:8px;border:none;border-radius:5px;font-size:14px;font-weight:500;cursor:pointer;background:none;color:var(--wx-sub);transition:all .2s}
.seg button.on-exp{background:var(--wx-card);color:var(--wx-text);box-shadow:0 1px 3px rgba(0,0,0,.08)}
.seg button.on-inc{background:var(--wx-card);color:var(--wx-text);box-shadow:0 1px 3px rgba(0,0,0,.08)}

.fg{margin-bottom:14px}
.fg label{display:block;font-size:13px;color:var(--wx-sub);margin-bottom:6px}
.fg input{width:100%;padding:10px 12px;border:1px solid var(--wx-line);border-radius:4px;font-size:15px;background:var(--wx-bg);color:var(--wx-text);font-family:inherit}
.fg input:focus{outline:none;border-color:var(--wx-blue)}
.amt-inp{font-size:36px!important;text-align:center;font-weight:400;border:none!important;background:transparent!important;padding:12px 0!important}

.cat-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
.cat-item{display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 4px;border-radius:6px;cursor:pointer;border:1px solid transparent;background:var(--wx-bg);transition:all .15s;font-size:11px;color:var(--wx-text)}
.cat-item:active{background:var(--wx-divider)}
.cat-item.sel{border-color:var(--wx-blue);background:#ECF0FA}
.cat-item .ci{font-size:22px}
.save-btn{width:100%;padding:12px;border:none;border-radius:6px;font-size:16px;font-weight:500;cursor:pointer;color:#fff;margin-top:6px}
.save-btn.exp{background:var(--wx-red)}.save-btn.inc{background:var(--wx-green)}
.cancel-btn{width:100%;padding:12px;border:none;background:none;color:var(--wx-sub);font-size:14px;cursor:pointer;margin-top:6px}

/* bottom tab bar - wx style */
.wx-navbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--wx-card);border-top:1px solid var(--wx-line);display:flex;padding:4px 0 calc(4px + var(--safe-bottom));z-index:100}
.nb-item{flex:1;display:flex;flex-direction:column;align-items:center;padding:3px 0;border:none;background:none;cursor:pointer;color:var(--wx-desc);font-size:10px;gap:1px}
.nb-item.active{color:var(--wx-green)}
.nb-item .nb-i{font-size:20px}
.nb-center{flex:1;display:flex;flex-direction:column;align-items:center;padding:3px 0;border:none;background:none;cursor:pointer}
.nb-center .nb-i{width:40px;height:40px;border-radius:50%;background:var(--wx-green);color:#fff;font-size:22px;display:flex;align-items:center;justify-content:center;margin-top:-14px;box-shadow:0 2px 8px rgba(7,193,96,.3)}

/* toast */
.wx-toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.75);color:#fff;padding:16px 24px;border-radius:6px;font-size:14px;z-index:2000;opacity:0;transition:opacity .2s;pointer-events:none;text-align:center;max-width:200px}
.wx-toast.show{opacity:1}

/* install tip */
.install-tip{background:var(--wx-card);margin:8px 0;padding:12px 16px;border-bottom:1px solid var(--wx-line);display:flex;align-items:center;gap:10px;cursor:pointer}
.install-tip .it-text{flex:1;font-size:13px;color:var(--wx-sub)}
.install-tip .it-btn{padding:6px 12px;border:none;border-radius:4px;background:var(--wx-green);color:#fff;font-size:13px;cursor:pointer}

.empty{text-align:center;padding:48px 16px;color:var(--wx-desc)}
.empty .ei{font-size:40px;margin-bottom:10px;display:block}
.empty p{font-size:13px}

@media(max-width:380px){.cat-grid{grid-template-columns:repeat(4,1fr)}.year-grid{grid-template-columns:repeat(3,1fr)}}
</style>
</head>
<body>
<div class="wx-toast" id="toast"></div>
<div class="app">
  <div class="topbar"><h1>记账</h1></div>

  <div class="month-bar">
    <button onclick="chMonth(-1)">&lt;</button><span id="curMonth"></span><button onclick="chMonth(1)">&gt;</button>
  </div>

  <!-- Balance -->
  <div class="cell-group">
    <div class="bal-cells">
      <div class="bal-cell"><div class="bl">收入</div><div class="bv inc" id="mInc">¥0.00</div></div>
      <div class="bal-cell"><div class="bl">支出</div><div class="bv exp" id="mExp">¥0.00</div></div>
      <div class="bal-cell"><div class="bl">结余</div><div class="bv" id="mBal">¥0.00</div></div>
    </div>
    <div class="budget-row" id="bInfo" style="display:none">
      <div class="budget-detail"><span>预算使用</span><span id="bText"></span></div>
      <div class="budget-track"><div class="budget-fill" id="bBar" style="width:0%;background:var(--wx-green)"></div></div>
    </div>
  </div>

  <!-- Tabs -->
  <div class="wx-tabs">
    <button class="wx-tab active" onclick="swTab('detail',this)">明细</button>
    <button class="wx-tab" onclick="swTab('chart',this)">统计</button>
    <button class="wx-tab" onclick="swTab('yearly',this)">年度</button>
    <button class="wx-tab" onclick="swTab('settings',this)">设置</button>
  </div>

  <!-- Detail -->
  <div class="tab-pane active" id="tab-detail">
    <div id="installBanner" class="install-tip" style="display:none" onclick="installApp()">
      <div class="it-text">添加到主屏幕，像APP一样使用</div>
      <div class="it-btn">安装</div>
    </div>
    <div class="action-row">
      <button class="act" onclick="openModal('expense')"><span class="act-icon">支出</span>记一笔支出</button>
      <button class="act" onclick="openModal('income')"><span class="act-icon">收入</span>记一笔收入</button>
    </div>
    <div id="recList" class="rec-list"></div>
  </div>

  <!-- Chart -->
  <div class="tab-pane" id="tab-chart">
    <div class="chart-section">
      <div class="cs-head">支出分类</div>
      <div class="chart-box"><canvas id="pieC"></canvas></div>
    </div>
    <div class="chart-section">
      <div class="cs-head">收支趋势</div>
      <div class="chart-box"><canvas id="lineC"></canvas></div>
    </div>
    <div class="rank-list" id="rkList">
      <div class="cs-head">支出排行</div>
    </div>
  </div>

  <!-- Yearly -->
  <div class="tab-pane" id="tab-yearly">
    <div class="cell-group">
      <div style="display:flex;align-items:center;justify-content:center;gap:20px;padding:12px">
        <button style="background:none;border:none;font-size:16px;color:var(--wx-blue);cursor:pointer" onclick="chYear(-1)">&lt;</button>
        <span id="curYear" style="font-size:16px;font-weight:500;min-width:80px;text-align:center"></span>
        <button style="background:none;border:none;font-size:16px;color:var(--wx-blue);cursor:pointer" onclick="chYear(1)">&gt;</button>
      </div>
    </div>
    <div class="chart-section">
      <div class="cs-head">年度收支</div>
      <div class="chart-box"><canvas id="yBarC"></canvas></div>
    </div>
    <div class="chart-section">
      <div class="cs-head">年度分类</div>
      <div class="chart-box"><canvas id="yPieC"></canvas></div>
    </div>
    <div class="year-card">
      <div class="cs-head">月度概览</div>
      <div class="year-grid" id="yGrid"></div>
    </div>
    <div class="rank-list" id="yRkList">
      <div class="cs-head">年度排行</div>
    </div>
  </div>

  <!-- Settings -->
  <div class="tab-pane" id="tab-settings">
    <div class="set-group">
      <div class="cs-head">预算</div>
      <div class="set-row"><label>每月预算</label><input type="number" id="budInp" placeholder="设置金额" min="0" step="100"></div>
      <button class="set-btn" onclick="saveBud()">保存</button>
    </div>
    <div class="set-group">
      <div class="cs-head">数据</div>
      <button class="set-btn outline" onclick="expData()">导出数据</button>
      <button class="set-btn outline" onclick="document.getElementById('impFile').click()">导入数据</button>
      <input type="file" id="impFile" accept=".json" style="display:none" onchange="impData(event)">
      <button class="set-btn danger" onclick="clearAll()">清空所有数据</button>
    </div>
  </div>
</div>

<!-- Navbar -->
<div class="wx-navbar">
  <button class="nb-item active" onclick="goHome()"><span class="nb-i">💬</span>账单</button>
  <button class="nb-item" onclick="swTabN('chart')"><span class="nb-i">📊</span>统计</button>
  <button class="nb-center" onclick="openModal('expense')"><span class="nb-i">+</span></button>
  <button class="nb-item" onclick="swTabN('yearly')"><span class="nb-i">📅</span>年度</button>
  <button class="nb-item" onclick="swTabN('settings')"><span class="nb-i">⚙️</span>设置</button>
</div>

<!-- Record Modal -->
<div class="modal-mask" id="recModal">
  <div class="modal-sheet">
    <div class="modal-bar"></div>
    <div class="modal-hd">记一笔</div>
    <div class="seg">
      <button id="tExp" class="on-exp" onclick="setType('expense')">支出</button>
      <button id="tInc" onclick="setType('income')">收入</button>
    </div>
    <div class="fg"><input type="number" class="amt-inp" id="amtInp" placeholder="0.00" step="0.01" min="0"></div>
    <div class="fg"><label>分类</label><div class="cat-grid" id="catGrid"></div></div>
    <div class="fg"><label>日期</label><input type="date" id="dateInp"></div>
    <div class="fg"><label>备注</label><input type="text" id="noteInp" placeholder="选填"></div>
    <button class="save-btn exp" id="subBtn" onclick="saveRec()">记支出</button>
    <button class="cancel-btn" onclick="closeModal()">取消</button>
  </div>
</div>

<!-- Budget Modal -->
<div class="modal-mask" id="budModal">
  <div class="modal-sheet">
    <div class="modal-bar"></div>
    <div class="modal-hd">设置预算</div>
    <div class="fg"><label>每月预算（元）</label><input type="number" id="budMInp" placeholder="3000" min="0" step="100" style="font-size:28px;text-align:center;font-weight:300"></div>
    <button class="set-btn" onclick="saveBudM()">确定</button>
    <button class="cancel-btn" onclick="closeBudModal()">取消</button>
  </div>
</div>

<script>
const EXP_CATS=[
  {id:'food',name:'餐饮',icon:'🍜'},{id:'transport',name:'交通',icon:'🚗'},
  {id:'shopping',name:'购物',icon:'🛒'},{id:'housing',name:'住房',icon:'🏠'},
  {id:'entertainment',name:'娱乐',icon:'🎮'},{id:'medical',name:'医疗',icon:'💊'},
  {id:'education',name:'教育',icon:'📖'},{id:'clothing',name:'服饰',icon:'👕'},
  {id:'beauty',name:'美妆',icon:'💄'},{id:'phone',name:'通讯',icon:'📱'},
  {id:'social',name:'社交',icon:'🥂'},{id:'pet',name:'宠物',icon:'🐱'},
  {id:'gift',name:'礼金',icon:'🧧'},{id:'travel',name:'旅行',icon:'✈️'},
  {id:'other_exp',name:'其他',icon:'📦'}
];
const INC_CATS=[
  {id:'salary',name:'工资',icon:'💰'},{id:'bonus',name:'奖金',icon:'🎁'},
  {id:'investment',name:'理财',icon:'📈'},{id:'parttime',name:'兼职',icon:'💼'},
  {id:'redpacket',name:'红包',icon:'🧧'},{id:'refund',name:'退款',icon:'↩️'},
  {id:'other_inc',name:'其他',icon:'💰'}
];
const CC={
  food:'#FA5151',transport:'#576B95',shopping:'#FF9500',housing:'#07C160',
  entertainment:'#FA5151',medical:'#576B95',education:'#FF9500',clothing:'#07C160',
  beauty:'#FA5151',phone:'#576B95',social:'#FF9500',pet:'#07C160',gift:'#FA5151',
  travel:'#576B95',other_exp:'#888888',salary:'#07C160',bonus:'#07C160',
  investment:'#576B95',parttime:'#07C160',redpacket:'#FA5151',refund:'#FF9500',
  other_inc:'#576B95'
};

let recs=JSON.parse(localStorage.getItem('accRecs')||'[]');
let budget=parseFloat(localStorage.getItem('monthlyBudget')||'0');
const now=new Date();
let vY=now.getFullYear(),vM=now.getMonth(),rType='expense',selCat=null;
let yvY=now.getFullYear();
let pieC=null,lineC=null,yBarC=null,yPieC=null;
let deferredPrompt=null;

if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredPrompt=e;document.getElementById('installBanner').style.display='flex'});
function installApp(){if(deferredPrompt){deferredPrompt.prompt();deferredPrompt.userChoice.then(()=>{deferredPrompt=null;document.getElementById('installBanner').style.display='none'})}}

function fmtD(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function fmtM(n){return '¥'+n.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,',')}

function init(){document.getElementById('dateInp').value=fmtD(new Date());document.getElementById('budInp').value=budget||'';update();renderCatGrid()}
function chMonth(d){vM+=d;if(vM>11){vM=0;vY++}if(vM<0){vM=11;vY--}update()}
function chYear(d){yvY+=d;renderYearly()}
function getMR(y,m){return recs.filter(r=>{const d=new Date(r.date);return d.getFullYear()===y&&d.getMonth()===m})}

function update(){
  const mn=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  document.getElementById('curMonth').textContent=vY+'年 '+mn[vM];
  const mr=getMR(vY,vM);
  const inc=mr.filter(r=>r.type==='income').reduce((s,r)=>s+r.amount,0);
  const exp=mr.filter(r=>r.type==='expense').reduce((s,r)=>s+r.amount,0);
  document.getElementById('mInc').textContent=fmtM(inc);
  document.getElementById('mExp').textContent=fmtM(exp);
  document.getElementById('mBal').textContent=fmtM(inc-exp);
  document.getElementById('mBal').style.color=(inc-exp)>=0?'var(--wx-green)':'var(--wx-red)';
  const bi=document.getElementById('bInfo');
  if(budget>0){
    const pct=Math.min(exp/budget*100,100),rem=budget-exp;
    document.getElementById('bText').textContent='已花 '+fmtM(exp)+' / '+fmtM(budget)+(rem>=0?' 剩余'+fmtM(rem):' 超支'+fmtM(-rem));
    const bar=document.getElementById('bBar');bar.style.width=pct+'%';
    bar.style.background=pct<60?'var(--wx-green)':pct<90?'var(--wx-orange)':'var(--wx-red)';
    bi.style.display='';
  }else bi.style.display='none';
  renderRecs(mr);renderCharts(mr);
}

function renderRecs(mr){
  const list=document.getElementById('recList');
  if(!mr.length){list.innerHTML='<div class="empty"><span class="ei">📝</span><p>暂无记录</p></div>';return}
  const sorted=[...mr].sort((a,b)=>new Date(b.date)-new Date(a.date));
  // Group by date
  const groups={};
  sorted.forEach(r=>{if(!groups[r.date])groups[r.date]=[];groups[r.date].push(r)});
  list.innerHTML=Object.entries(groups).map(([date,items])=>{
    const d=new Date(date);
    const dayLabel=(d.getMonth()+1)+'月'+d.getDate()+'日 周'+['日','一','二','三','四','五','六'][d.getDay()];
    const dayExp=items.filter(r=>r.type==='expense').reduce((s,r)=>s+r.amount,0);
    const dayInc=items.filter(r=>r.type==='income').reduce((s,r)=>s+r.amount,0);
    let header=`<div class="rec-date-header">${dayLabel}`;
    if(dayExp>0)header+=`  支出 ${fmtM(dayExp)}`;
    if(dayInc>0)header+=`  收入 ${fmtM(dayInc)}`;
    header+=`</div>`;
    return header+items.map(r=>{
      const cat=r.type==='expense'?EXP_CATS.find(c=>c.id===r.category)||{icon:'📦',name:'其他'}:INC_CATS.find(c=>c.id===r.category)||{icon:'💰',name:'其他'};
      return `<div class="rec-item">
        <div class="rec-left">
          <span class="rec-cat-icon">${cat.icon}</span>
          <div><div class="rec-cat-name">${cat.name}</div>${r.note?`<div class="rec-cat-note">${r.note}</div>`:''}</div>
        </div>
        <div class="rec-right">
          <div class="rec-amt ${r.type}">${r.type==='expense'?'-':'+'}${fmtM(r.amount)}</div>
          <button class="rec-del" onclick="delRec('${r.id}')">✕</button>
        </div>
      </div>`;
    }).join('');
  }).join('');
}

function renderCharts(mr){renderPie(mr);renderLine()}

function renderPie(mr){
  const er=mr.filter(r=>r.type==='expense'),ct={};
  er.forEach(r=>{ct[r.category]=(ct[r.category]||0)+r.amount});
  const labels=Object.keys(ct).map(id=>{const c=EXP_CATS.find(c=>c.id===id);return c?c.name:id});
  const data=Object.values(ct),colors=Object.keys(ct).map(id=>CC[id]||'#CCC');
  if(pieC)pieC.destroy();
  const ctx=document.getElementById('pieC').getContext('2d');
  if(!data.length){
    pieC=new Chart(ctx,{type:'doughnut',data:{labels:['暂无'],datasets:[{data:[1],backgroundColor:['#E5E5E5']}]},options:{plugins:{legend:{display:false}},responsive:true,maintainAspectRatio:false}});
    document.getElementById('rkList').innerHTML='<div class="cs-head">支出排行</div><div class="empty"><p>暂无支出</p></div>';return;
  }
  pieC=new Chart(ctx,{type:'doughnut',data:{labels,datasets:[{data,backgroundColor:colors,borderWidth:1,borderColor:'#FFF'}]},options:{responsive:true,maintainAspectRatio:false,cutout:'55%',plugins:{legend:{position:'right',labels:{boxWidth:10,padding:6,font:{size:12},color:'#888'}},tooltip:{callbacks:{label:c=>c.label+': '+fmtM(c.raw)}}}}});
  renderRk(ct);
}

function renderRk(ct){
  const sorted=Object.entries(ct).sort((a,b)=>b[1]-a[1]);
  const total=sorted.reduce((s,e)=>s+e[1],0),maxV=sorted[0]?sorted[0][1]:1;
  document.getElementById('rkList').innerHTML='<div class="cs-head">支出排行</div>'+sorted.map(([id,amt],i)=>{
    const cat=EXP_CATS.find(c=>c.id===id)||{icon:'📦',name:id};
    const pct=(amt/total*100).toFixed(1),bw=(amt/maxV*100).toFixed(0);
    return `<div class="rk-row">
      <div class="rk-idx ${i<3?'rk-top':''}">${i+1}</div>
      <div class="rk-mid"><div class="rk-name">${cat.icon} ${cat.name}</div><div class="rk-track"><div class="rk-fill" style="width:${bw}%;background:${CC[id]||'#CCC'}"></div></div></div>
      <div class="rk-val">${fmtM(amt)}<div class="rk-pct">${pct}%</div></div>
    </div>`;
  }).join('');
}

function renderLine(){
  const ms=[],id=[],ed=[];
  for(let i=5;i>=0;i--){
    let m=vM-i,y=vY;while(m<0){m+=12;y--}
    ms.push((m+1)+'月');
    const mr=getMR(y,m);
    id.push(mr.filter(r=>r.type==='income').reduce((s,r)=>s+r.amount,0));
    ed.push(mr.filter(r=>r.type==='expense').reduce((s,r)=>s+r.amount,0));
  }
  if(lineC)lineC.destroy();
  lineC=new Chart(document.getElementById('lineC').getContext('2d'),{
    type:'line',data:{labels:ms,datasets:[
      {label:'收入',data:id,borderColor:'#07C160',backgroundColor:'rgba(7,193,96,0.08)',fill:true,tension:.3,borderWidth:2,pointRadius:3},
      {label:'支出',data:ed,borderColor:'#FA5151',backgroundColor:'rgba(250,81,81,0.08)',fill:true,tension:.3,borderWidth:2,pointRadius:3}
    ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{boxWidth:10,font:{size:12},color:'#888'}},tooltip:{callbacks:{label:c=>c.dataset.label+': '+fmtM(c.raw)}}},scales:{y:{beginAtZero:true,ticks:{callback:v=>'¥'+v,color:'#888'},grid:{color:'#F0F0F0'}},x:{ticks:{color:'#888'},grid:{display:false}}}}
  });
}

function renderYearly(){
  document.getElementById('curYear').textContent=yvY+'年';
  const yr=recs.filter(r=>new Date(r.date).getFullYear()===yvY);
  const ms=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  const yi=[],ye=[];
  for(let m=0;m<12;m++){const mr=getMR(yvY,m);yi.push(mr.filter(r=>r.type==='income').reduce((s,r)=>s+r.amount,0));ye.push(mr.filter(r=>r.type==='expense').reduce((s,r)=>s+r.amount,0))}
  if(yBarC)yBarC.destroy();
  yBarC=new Chart(document.getElementById('yBarC').getContext('2d'),{
    type:'bar',data:{labels:ms,datasets:[{label:'收入',data:yi,backgroundColor:'#07C160',borderRadius:2},{label:'支出',data:ye,backgroundColor:'#FA5151',borderRadius:2}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{boxWidth:10,color:'#888'}},tooltip:{callbacks:{label:c=>c.dataset.label+': '+fmtM(c.raw)}}},scales:{y:{beginAtZero:true,ticks:{callback:v=>'¥'+v,color:'#888'},grid:{color:'#F0F0F0'}},x:{ticks:{color:'#888'},grid:{display:false}}}}
  });
  const ct={};yr.filter(r=>r.type==='expense').forEach(r=>{ct[r.category]=(ct[r.category]||0)+r.amount});
  const labels=Object.keys(ct).map(id=>{const c=EXP_CATS.find(c=>c.id===id);return c?c.name:id});
  const data=Object.values(ct),colors=Object.keys(ct).map(id=>CC[id]||'#CCC');
  if(yPieC)yPieC.destroy();
  if(!data.length){yPieC=new Chart(document.getElementById('yPieC').getContext('2d'),{type:'doughnut',data:{labels:['暂无'],datasets:[{data:[1],backgroundColor:['#E5E5E5']}]},options:{plugins:{legend:{display:false}},responsive:true,maintainAspectRatio:false}})}
  else{yPieC=new Chart(document.getElementById('yPieC').getContext('2d'),{type:'doughnut',data:{labels,datasets:[{data,backgroundColor:colors,borderWidth:1,borderColor:'#FFF'}]},options:{responsive:true,maintainAspectRatio:false,cutout:'55%',plugins:{legend:{position:'right',labels:{boxWidth:10,padding:6,font:{size:12},color:'#888'}}}}})}
  const grid=document.getElementById('yGrid');
  grid.innerHTML=ms.map((n,i)=>{
    const has=yi[i]>0||ye[i]>0;
    return `<div class="yg-cell"><div class="yn">${n}</div>${has?`<div class="yv yv-e">支${fmtM(ye[i])}</div><div class="yv yv-i">收${fmtM(yi[i])}</div>`:'<div class="yv">--</div>'}</div>`;
  }).join('');
  if(!Object.keys(ct).length){document.getElementById('yRkList').innerHTML='<div class="cs-head">年度排行</div><div class="empty"><p>暂无数据</p></div>'}
  else{renderYRk(ct)}
}

function renderYRk(ct){
  const sorted=Object.entries(ct).sort((a,b)=>b[1]-a[1]);
  const total=sorted.reduce((s,e)=>s+e[1],0),maxV=sorted[0]?sorted[0][1]:1;
  document.getElementById('yRkList').innerHTML='<div class="cs-head">年度排行</div>'+sorted.map(([id,amt],i)=>{
    const cat=EXP_CATS.find(c=>c.id===id)||{icon:'📦',name:id};
    const pct=(amt/total*100).toFixed(1),bw=(amt/maxV*100).toFixed(0);
    return `<div class="rk-row">
      <div class="rk-idx ${i<3?'rk-top':''}">${i+1}</div>
      <div class="rk-mid"><div class="rk-name">${cat.icon} ${cat.name}</div><div class="rk-track"><div class="rk-fill" style="width:${bw}%;background:${CC[id]||'#CCC'}"></div></div></div>
      <div class="rk-val">${fmtM(amt)}<div class="rk-pct">${pct}%</div></div>
    </div>`;
  }).join('');
}

function openModal(type){rType=type;selCat=null;document.getElementById('amtInp').value='';document.getElementById('noteInp').value='';document.getElementById('dateInp').value=fmtD(new Date());setType(type);renderCatGrid();document.getElementById('recModal').classList.add('show')}
function closeModal(){document.getElementById('recModal').classList.remove('show')}
function setType(type){rType=type;selCat=null;document.getElementById('tExp').className=type==='expense'?'on-exp':'';document.getElementById('tInc').className=type==='income'?'on-inc':'';const sb=document.getElementById('subBtn');sb.className=type==='expense'?'save-btn exp':'save-btn inc';sb.textContent=type==='expense'?'记支出':'记收入';renderCatGrid()}
function renderCatGrid(){const cats=rType==='expense'?EXP_CATS:INC_CATS;document.getElementById('catGrid').innerHTML=cats.map(c=>`<div class="cat-item ${selCat===c.id?'sel':''}" onclick="selCatFn('${c.id}')"><span class="ci">${c.icon}</span><span>${c.name}</span></div>`).join('')}
function selCatFn(id){selCat=id;renderCatGrid()}

function saveRec(){
  const amount=parseFloat(document.getElementById('amtInp').value);
  const date=document.getElementById('dateInp').value;
  const note=document.getElementById('noteInp').value.trim();
  if(!amount||amount<=0)return toast('请输入金额');
  if(!selCat)return toast('请选择分类');
  if(!date)return toast('请选择日期');
  const rec={id:Date.now().toString(36)+Math.random().toString(36).substr(2,4),type:rType,amount,category:selCat,date,note,createdAt:Date.now()};
  recs.push(rec);saveData();closeModal();update();toast('已保存');
}
function delRec(id){if(!confirm('删除此记录？'))return;recs=recs.filter(r=>r.id!==id);saveData();update();toast('已删除')}
function saveData(){localStorage.setItem('accRecs',JSON.stringify(recs))}

function openBudModal(){document.getElementById('budMInp').value=budget||'';document.getElementById('budModal').classList.add('show')}
function closeBudModal(){document.getElementById('budModal').classList.remove('show')}
function saveBudM(){budget=parseFloat(document.getElementById('budMInp').value)||0;localStorage.setItem('monthlyBudget',budget.toString());document.getElementById('budInp').value=budget;closeBudModal();update();toast('预算已设置')}
function saveBud(){budget=parseFloat(document.getElementById('budInp').value)||0;localStorage.setItem('monthlyBudget',budget.toString());update();toast('预算已保存')}

function expData(){const d={records:recs,budget,exportTime:new Date().toISOString()};const blob=new Blob([JSON.stringify(d,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='记账数据_'+fmtD(new Date())+'.json';a.click();toast('已导出')}
function impData(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=function(ev){try{const d=JSON.parse(ev.target.result);if(d.records&&Array.isArray(d.records)){if(!confirm('导入合并 '+d.records.length+' 条？'))return;const ids=new Set(recs.map(r=>r.id));d.records.forEach(r=>{if(!ids.has(r.id))recs.push(r)});if(d.budget){budget=d.budget;localStorage.setItem('monthlyBudget',budget.toString())}saveData();update();toast('导入成功')}else toast('格式错误')}catch(err){toast('解析失败')}};r.readAsText(f);e.target.value=''}
function clearAll(){if(!confirm('清空所有数据？不可恢复'))return;recs=[];budget=0;localStorage.removeItem('accRecs');localStorage.removeItem('monthlyBudget');document.getElementById('budInp').value='';update();toast('已清空')}

function swTab(name,btn){document.querySelectorAll('.tab-pane').forEach(t=>t.classList.remove('active'));document.querySelectorAll('.wx-tab').forEach(b=>b.classList.remove('active'));document.getElementById('tab-'+name).classList.add('active');if(btn)btn.classList.add('active');if(name==='chart')update();if(name==='yearly')renderYearly()}
function swTabN(name){const tabs=document.querySelectorAll('.wx-tab'),map={chart:1,yearly:2,settings:3};const i=map[name];if(i!==undefined&&tabs[i])swTab(name,tabs[i])}
function goHome(){document.querySelectorAll('.tab-pane').forEach(t=>t.classList.remove('active'));document.querySelectorAll('.wx-tab').forEach(b=>b.classList.remove('active'));document.getElementById('tab-detail').classList.add('active');document.querySelector('.wx-tab').classList.add('active');document.querySelectorAll('.nb-item').forEach(n=>n.classList.remove('active'));document.querySelectorAll('.nb-item')[0].classList.add('active')}

function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1500)}

document.getElementById('recModal').addEventListener('click',function(e){if(e.target===this)closeModal()});
document.getElementById('budModal').addEventListener('click',function(e){if(e.target===this)closeBudModal()});

init();
</script>
</body>
</html>
